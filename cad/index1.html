<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Demo — Digital Twin (Standalone Phase 7 Implementation)</title>
  <script type="importmap">
    {"imports":{
      "three":"https://unpkg.com/three@0.158.0/build/three.module.js",
      "three/addons/":"https://unpkg.com/three@0.158.0/examples/jsm/"
    }}
  </script>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    :root{
      --bg:#0a0c0f;--surface:#111318;--surface2:#1a1d24;--border:#2a2d38;
      --text:#e8eaf0;--muted:#6b7080;--teal:#00c9a7;--red:#f87171;--amber:#fbbf24;--purple:#a78bfa;
    }
    body{background:var(--bg);color:var(--text);font-family:'Segoe UI',system-ui,sans-serif;
      display:grid;grid-template-columns:1fr 320px;grid-template-rows:48px 1fr;height:100vh;overflow:hidden}
    header{grid-column:1/-1;display:flex;align-items:center;gap:12px;padding:0 16px;
      background:var(--surface);border-bottom:1px solid var(--border)}
    .logo{font-size:12px;font-weight:600;letter-spacing:.08em;color:var(--teal)}
    .htitle{font-size:12px;color:var(--muted)}
    .hdot{width:8px;height:8px;border-radius:50%;background:#4b5563;transition:background .3s}
    .hdot.run{background:var(--teal);box-shadow:0 0 6px var(--teal)}
    .hdot.inspect{background:var(--amber);box-shadow:0 0 6px var(--amber)}
    #hstatus{font-size:12px;color:var(--muted);margin-left:6px;margin-right:16px}
    
    .home-btn{
      display:flex;align-items:center;justify-content:center;
      font-size:16px;color:var(--muted);text-decoration:none;
      width:32px;height:32px;border-radius:6px;border:1px solid transparent;
      margin-left:auto;cursor:pointer;transition:all .2s;
    }
    .home-btn:hover{color:var(--teal);background:var(--surface2);border-color:var(--border)}

    #canvas-wrap{position:relative;background:#06080a}
    canvas{display:block;width:100%;height:100%}
    .overlay{position:absolute;top:12px;left:12px;background:rgba(10,12,15,.88);
      border:1px solid var(--border);border-radius:10px;padding:10px 14px;min-width:220px}
    .ov-label{font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);margin-bottom:2px}
    .ov-state{font-size:20px;font-weight:700;color:var(--teal);line-height:1.1;transition:color .3s}
    .ov-state.inspect-mode{color:var(--amber)}
    .ov-desc{font-size:11px;color:var(--muted);margin-top:3px}
    .anim-tag{position:absolute;bottom:12px;left:12px;background:rgba(251,191,36,.15);
      border:1px solid var(--amber);border-radius:7px;padding:5px 12px;font-size:11px;color:var(--amber);display:none}
    
    .panel{background:var(--surface);border-left:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden}
    .ctrl{padding:14px;border-bottom:1px solid var(--border);display:flex;flex-direction:column;gap:8px}
    .btn-row{display:flex;gap:6px}
    .btn{flex:1;padding:8px;border:1px solid var(--border);border-radius:7px;font-size:11px;
      font-weight:600;cursor:pointer;background:var(--surface2);color:var(--text);transition:all .2s}
    .btn:hover{border-color:var(--teal);color:var(--text)}
    .btn.primary{background:rgba(0,201,167,.12);color:var(--teal);border-color:var(--teal)}
    .btn.danger{background:rgba(248,113,113,.12);color:var(--red);border-color:var(--red)}
    .btn.active-mode{background:var(--teal);color:#000;border-color:var(--teal)}
    .btn.ok-btn{background:rgba(0,201,167,0.2);color:var(--teal);border-color:var(--teal);font-size:12px}
    .btn.ok-btn:hover{background:var(--teal);color:#000}
    .btn.ng-btn{background:rgba(248,113,113,0.2);color:var(--red);border-color:var(--red);font-size:12px}
    .btn.ng-btn:hover{background:var(--red);color:#000}
    .btn:disabled{opacity:.15;cursor:not-allowed;pointer-events:none}
    
    .speed-row{display:flex;align-items:center;gap:8px}
    .slbl{font-size:11px;color:var(--muted);white-space:nowrap}
    input[type=range]{flex:1;accent-color:var(--teal)}
    .sval{font-size:11px;color:var(--teal);min-width:22px;text-align:right}
    
    .counters{display:flex;border-bottom:1px solid var(--border);flex-shrink:0}
    .cnt{flex:1;padding:10px;text-align:center;border-right:1px solid var(--border)}
    .cnt-val{font-size:18px;font-weight:700;color:var(--teal)}
    .cnt-lbl{font-size:9px;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);margin-top:1px}
    
    .sec-title{font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);padding:10px 14px 4px}
    .states{flex:1;overflow-y:auto;padding:0 8px 8px;scrollbar-width:thin;scrollbar-color:var(--border) transparent}
    .si{display:flex;align-items:center;gap:8px;padding:5px 8px;border-radius:6px;margin-bottom:2px;transition:background .2s}
    .si.active{background:rgba(0,201,167,.1)}
    .si.active.inspecting{background:rgba(251,191,36,.12)}
    .si-dot{width:7px;height:7px;border-radius:50%;background:#2a2d38;flex-shrink:0;transition:background .3s}
    .si.active .si-dot{background:var(--teal);box-shadow:0 0 5px var(--teal)}
    .si.active.inspecting .si-dot{background:var(--amber);box-shadow:0 0 5px var(--amber)}
    .si-name{font-size:10px;font-weight:600;color:var(--muted);min-width:105px}
    .si.active .si-name{color:var(--teal)}
    .si.active.inspecting .si-name{color:var(--amber)}
    .si-action{font-size:10px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    
    .log-wrap{border-top:1px solid var(--border);height:165px;display:flex;flex-direction:column;flex-shrink:0}
    .log-hdr{padding:6px 14px;display:flex;justify-content:space-between;align-items:center}
    .log-body{flex:1;overflow-y:auto;padding:0 14px 8px;font-family:monospace;font-size:10px;line-height:1.7}
    .le .ts{color:#4b5563;margin-right:5px}
    .le.info .ev{color:var(--teal)}.le.warn .ev{color:var(--amber)}.le.err .ev{color:var(--red)}
  </style>
</head>
<body>
<header>
  <span class="logo">Demo</span>
  <span style="color:var(--border)">|</span>
  <span class="htitle">SMD Reel Packing — Standalone Logic System</span>
  <a href="index.html" class="home-btn">🏠</a>
  <div class="hdot" id="hdot"></div>
  <span id="hstatus">Idle</span>
</header>

<div id="canvas-wrap">
  <canvas id="c"></canvas>
  <div class="overlay">
    <div class="ov-label">Current State</div>
    <div class="ov-state" id="ovState">READY</div>
    <div class="ov-desc" id="ovDesc">Waiting for Start</div>
  </div>
  <div class="anim-tag" id="animTag">⟳ Animating</div>
</div>

<div class="panel">
  <div class="ctrl">
    <div class="btn-row">
      <button class="btn active-mode" id="btnModeAuto" onclick="switchMode('auto')">🤖 Auto</button>
      <button class="btn" id="btnModeSemi" onclick="switchMode('semi')">🕹️ Semi-Auto</button>
    </div>
    <div class="btn-row">
      <button class="btn primary" id="btnStart" onclick="fsmStart()">▶ Start</button>
      <button class="btn danger" id="btnReset" onclick="fsmReset()" disabled>↺ Reset</button>
    </div>
    <div class="sec-title" style="padding:4px 0 2px 0; font-size:9px">Inspection Decision (Semi-Auto)</div>
    <div class="btn-row">
      <button class="btn ok-btn" id="btnOK" onclick="fsmDecision(true)" disabled>👍 OK</button>
      <button class="btn ng-btn" id="btnNG" onclick="fsmDecision(false)" disabled>👎 NG</button>
    </div>
    <div class="speed-row">
      <span class="slbl">Auto Speed</span>
      <input type="range" id="spd" min="0.5" max="3" step="0.5" value="1" oninput="updateSpeedSlider(this.value)">
      <span class="sval" id="sval">1×</span>
    </div>
  </div>
  
  <div class="counters">
    <div class="cnt"><div class="cnt-val" id="cCycles">0</div><div class="cnt-lbl">Feeds (Cycles)</div></div>
  </div>
  
  <div class="sec-title">FSM Flow States</div>
  <div class="states" id="statesList"></div>
  
  <div class="log-wrap">
    <div class="log-hdr"><span class="sec-title" style="padding:0">Event Log</span></div>
    <div class="log-body" id="logBody"></div>
  </div>
</div>

<script type="module">
import * as THREE from 'three';
import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

const PART_NAMES = {
  carrier_tape: 'Cerrier', 
  roller_feed:  'Roll_1', 
  feeder_block: 'Feed_Cerrier',
  roller_blue:  'Roll_2', 
  sealing_head: 'Sealing'
};

const STATES = [
  {id:'LOAD_CARRIER',          action:'โหลด Carrier & Cover Tape เข้าที่เฉยๆ', isCheck:false},
  {id:'INDEX_CARRIER',         action:'จัด Carrier & Cover ให้อยู่ในตำแหน่งเพื่อจะเริ่มการทำงานเฉย', isCheck:false},
  {id:'POWER_ON',              action:'เริ่มเปิดเครื่อง ทุกอย่างจะถูกเปิดเพื่อสแตนบายเฉย', isCheck:false},
  {id:'SET_PARAMS',            action:'Set ค่าต่างๆ พารามิเตอร์ของระบบ', isCheck:false},
  {id:'SENSOR_CHECK_CARRIER',   action:'[CHECK] เซนเซอร์ตรวจสอบว่า Carrier อยู่ตำแหน่งจริงมั้ย', isCheck:true},
  {id:'READY',                 action:'ถ้ามี Carrier ก็เริ่มต้นระบบได้เลย', isCheck:false},
  {id:'LOAD_PART',             action:'มีการใส่ชิ้นส่วนลงใน Carrier', isCheck:false},
  {id:'VISION',                action:'[CHECK] พอใส่เสร็จกล้อง 1 ก็จะตรวจสอบความถูกต้องของชิ้นงาน', isCheck:true},
  {id:'CHECK_TEMP',            action:'[CHECK] ถ้าถูกแล้วก็จะทำการเช็คอุณหภูมิว่าถึงค่าที่กำหนดยัง', isCheck:true},
  {id:'FEED_CARRIER',          action:'Carrier ขยับเลื่อน และ Roll_1 หมุนตอนเลื่อนนี่แหละ', isCheck:false},
  {id:'COUNT_PROCESS',         action:'จะมีการนับชิ้นงานโดยกล้อง 1 และ Encoder ที่นับตามระยะพิตช์', isCheck:false},
  {id:'COUNT_CHECK',           action:'[CHECK] ตรวจสอบว่าค่านับตรงกับที่เช็คมั้ย', isCheck:true},
  {id:'COUNT_ACCUMULATE',      action:'ถ้าตรงก็นับบวกสะสมขึ้นเพิ่ม 1 ชิ้น', isCheck:false},
  {id:'SEAL_PROCESS',          action:'หัวซีลความร้อน (Seal) สับกดลงและยกตัวคืนที่สำเร็จ', isCheck:false},
  {id:'VISION_QC',             action:'[CHECK] เช็คความถูกต้องของการซีลว่า Seal ดีมั้ย', isCheck:true},
  {id:'TAKEUP_REEL',           action:'ถ้าดี Roll_2 ก็จะหมุนม้วนเก็บชิ้นงาน', isCheck:false}
];

window.speedMul = 1;

// ── Three.js Engine Setup ──
const canvas = document.getElementById('c');
const renderer = new THREE.WebGLRenderer({canvas, antialias:true});
renderer.setPixelRatio(Math.min(devicePixelRatio,2));
renderer.outputColorSpace = THREE.SRGBColorSpace;

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x06080a);
const camera = new THREE.PerspectiveCamera(45,1,0.01,1000);
const controls = new OrbitControls(camera, canvas);
controls.enableDamping = true;

scene.add(new THREE.AmbientLight(0xffffff,1.2));
const dl = new THREE.DirectionalLight(0xffffff,1.5); dl.position.set(4,6,4); scene.add(dl);

// ── Registry ──
const meshMap={}, origPos={};
function reg(role,mesh){
  meshMap[role]=mesh;
  origPos[role]=mesh.position.clone();
  mesh._origRot = mesh.rotation.clone(); 
}

// ── 🦾 เม็ดงานอิสระและเส้นแสงเลเซอร์ตรวจสอบเพิ่มเติม (Phase 7 UI) ──
const partGeo = new THREE.BoxGeometry(0.04, 0.04, 0.04);
const partMat = new THREE.MeshStandardMaterial({ color: 0xa78bfa, emissive: 0x2e1065, roughness: 0.2 });
const partMesh = new THREE.Mesh(partGeo, partMat);
partMesh.position.set(-0.25, 0.44, 0.03);
partMesh.visible = false;
scene.add(partMesh);

const laserGeo = new THREE.CylinderGeometry(0.005, 0.005, 0.4, 8);
const laserMat = new THREE.MeshBasicMaterial({ color: 0x00ff66, transparent: true, opacity: 0.0 });
const laserMesh = new THREE.Mesh(laserGeo, laserMat);
laserMesh.position.set(0.12, 0.65, 0.03);
scene.add(laserMesh);

// ── Tween System ──
const tweens=[];
function twCustomKey(roleKey,targetMesh,fromPos,toPos,durSec,onDone=null){
  const i=tweens.findIndex(t=>t.role===roleKey); if(i>-1) tweens.splice(i,1);
  tweens.push({role:roleKey,mesh:targetMesh,from:fromPos.clone(),to:toPos.clone(),dur:durSec,elapsed:0,onDone});
  document.getElementById('animTag').style.display='block';
}

function twRot(role,deltaRot,durSec,axis='x'){
  const mesh=meshMap[role]; if(!mesh) return;
  const key=role+'_r';
  const i=tweens.findIndex(t=>t.role===key); if(i>-1) tweens.splice(i,1);
  tweens.push({role:key,mesh,fromRot:mesh.rotation[axis],toRot:mesh.rotation[axis]+deltaRot,isRot:true,rotAxis:axis,dur:durSec,elapsed:0});
  document.getElementById('animTag').style.display='block';
}

function ret(role,durSec=0.18){
  const mesh=meshMap[role]; if(!mesh||!origPos[role]) return;
  const i=tweens.findIndex(t=>t.role===role); if(i>-1) tweens.splice(i,1);
  tweens.push({role,mesh,from:mesh.position.clone(),to:origPos[role].clone(),dur:durSec,elapsed:0});
}
function ease(t){return t<0.5?2*t*t:-1+(4-2*t)*t;}

// ── 🎬 Animation Mapping ──
function playAnim(id){
  const S = window.speedMul;
  const sealMesh = meshMap['sealing_head'];
  laserMat.opacity = 0.0;

  switch(id){
    case 'LOAD_PART':
      partMesh.position.set(-0.25, 0.8, 0.03);
      partMesh.visible = true;
      const dropTarget = new THREE.Vector3(-0.25, 0.44, 0.03);
      twCustomKey('part_drop', partMesh, partMesh.position, dropTarget, 0.6/S);
      break;

    case 'VISION':
      laserMesh.position.set(0.12, 0.65, 0.03); 
      laserMat.color.setHex(0x00ff66);
      laserMat.opacity = 0.7;
      break;

    case 'FEED_CARRIER':
      twRot('roller_feed', -Math.PI * 2.0, 1.0/S, 'x'); 
      twRot('feeder_block', -Math.PI * 2.0, 1.0/S, 'z'); 
      if(partMesh.visible) {
        const partNext = partMesh.position.clone().add(new THREE.Vector3(0.15, 0, 0));
        twCustomKey('part_move', partMesh, partMesh.position, partNext, 1.0/S);
      }
      break;

    case 'SEAL_PROCESS':
      if(sealMesh && origPos['sealing_head']){
        const downTarget = origPos['sealing_head'].clone().add(new THREE.Vector3(0, -0.2, 0));
        twCustomKey('sealing_down', sealMesh, sealMesh.position, downTarget, 0.4/S, () => {
           twCustomKey('sealing_up', sealMesh, sealMesh.position, origPos['sealing_head'], 0.4/S);
        });
      }
      break;

    case 'VISION_QC':
      laserMesh.position.set(0.4, 0.65, 0.03); 
      laserMat.color.setHex(0x00ffff);
      laserMat.opacity = 0.7;
      break;

    case 'TAKEUP_REEL':
      twRot('roller_blue', Math.PI * 2.0, 0.8/S, 'x'); 
      if(partMesh.visible) {
        const rollTarget = partMesh.position.clone().add(new THREE.Vector3(0.3, 0.15, 0));
        twCustomKey('part_to_reel', partMesh, partMesh.position, rollTarget, 0.8/S, () => {
           partMesh.visible = false;
        });
      }
      break;

    case 'LOAD_CARRIER':
      ret('carrier_tape', 0.2/S); 
      ret('sealing_head', 0.2/S);
      partMesh.visible = false;
      break;
  }
}

// ── Render Loop ──
const clock = new THREE.Clock();
function animate(){
  requestAnimationFrame(animate);
  const dt = clock.getDelta() * window.speedMul;
  controls.update();
  
  for(let i=tweens.length-1; i>=0; i--){
    const t=tweens[i]; t.elapsed+=dt;
    const currentDuration = t.dur || 1.0;
    const p=Math.min(t.elapsed/currentDuration,1), ep=ease(p);
    
    if(t.isRot) t.mesh.rotation[t.rotAxis||'x'] = t.fromRot + (t.toRot - t.fromRot) * ep;
    else t.mesh.position.lerpVectors(t.from,t.to,ep);
    if(p>=1){ if(t.onDone) t.onDone(); tweens.splice(i,1); }
  }

  if(tweens.length===0) document.getElementById('animTag').style.display='none';
  renderer.render(scene,camera);
}
animate();

// ── Load Model ──
new GLTFLoader().load('./export/Machine.glb', gltf=>{
  const model = gltf.scene; scene.add(model);
  model.traverse(obj => { if(obj.isMesh) obj.castShadow = obj.receiveShadow = true; });

  const box=new THREE.Box3().setFromObject(model);
  const center=box.getCenter(new THREE.Vector3());
  const size=box.getSize(new THREE.Vector3()).length();
  camera.position.set(center.x + size*0.6, center.y + size*0.5, center.z + size*0.8);
  controls.target.copy(center); controls.update();
  
  let feederGroup = null;
  model.traverse(obj => {
    if (obj.name === PART_NAMES.carrier_tape) reg('carrier_tape', obj);
    else if (obj.name === PART_NAMES.sealing_head) reg('sealing_head', obj);
    else if (obj.name === PART_NAMES.roller_feed) {
      obj.geometry.computeBoundingBox();
      const localCenter = new THREE.Vector3(); obj.geometry.boundingBox.getCenter(localCenter);
      obj.geometry.center(); obj.updateMatrixWorld(true); localCenter.applyMatrix4(obj.matrixWorld);
      obj.position.copy(localCenter); reg('roller_feed', obj);
    } 
    else if (obj.name === PART_NAMES.roller_blue) {
      if(obj.isMesh) {
        obj.geometry.computeBoundingBox();
        const blueCenter = new THREE.Vector3(); obj.geometry.boundingBox.getCenter(blueCenter);
        obj.geometry.center(); blueCenter.applyMatrix4(obj.matrixWorld);
        obj.position.copy(blueCenter); reg('roller_blue', obj);
      } else { reg('roller_blue
