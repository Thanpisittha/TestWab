<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>BK05 — Digital Twin (Strict 3-Step FSM Sequence)</title>
  <script type="importmap">
    {"imports":{
      "three":"https://unpkg.com/three@0.158.0/build/three.module.js",
      "three/addons/":"https://unpkg.com/three@0.158.0/examples/jsm/"
    }}
  </script>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    :root{
      --bg:#0a0c0f;--surface:#111318;--surface2:#1a1d24;--border:#2a2d38;
      --text:#e8eaf0;--muted:#6b7080;--teal:#00c9a7;--red:#f87171;--amber:#fbbf24;--purple:#a78bfa;
    }
    body{background:var(--bg);color:var(--text);font-family:'Segoe UI',system-ui,sans-serif;
      display:grid;grid-template-columns:1fr 320px;grid-template-rows:48px 1fr;height:100vh;overflow:hidden}
    header{grid-column:1/-1;display:flex;align-items:center;gap:12px;padding:0 16px;
      background:var(--surface);border-bottom:1px solid var(--border)}
    .logo{font-size:12px;font-weight:600;letter-spacing:.08em;color:var(--teal)}
    .htitle{font-size:12px;color:var(--muted)}
    .hdot{width:8px;height:8px;border-radius:50%;background:#4b5563;margin-left:auto;transition:background .3s}
    .hdot.run{background:var(--teal);box-shadow:0 0 6px var(--teal)}
    #hstatus{font-size:12px;color:var(--muted);margin-left:6px}
    #canvas-wrap{position:relative;background:#06080a}
    canvas{display:block;width:100%;height:100%}
    .overlay{position:absolute;top:12px;left:12px;background:rgba(10,12,15,.88);
      border:1px solid var(--border);border-radius:10px;padding:10px 14px;min-width:160px}
    .ov-label{font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);margin-bottom:2px}
    .ov-state{font-size:22px;font-weight:700;color:var(--teal);line-height:1.1;transition:color .3s}
    .ov-desc{font-size:11px;color:var(--muted);margin-top:3px}
    .anim-tag{position:absolute;bottom:12px;left:12px;background:rgba(251,191,36,.15);
      border:1px solid var(--amber);border-radius:7px;padding:5px 12px;font-size:11px;color:var(--amber);display:none}
    .panel{background:var(--surface);border-left:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden}
    .ctrl{padding:14px;border-bottom:1px solid var(--border);display:flex;flex-direction:column;gap:8px}
    .btn-row{display:flex;gap:6px}
    .btn{flex:1;padding:8px;border:1px solid var(--border);border-radius:7px;font-size:11px;
      font-weight:600;cursor:pointer;background:var(--surface2);color:var(--text);transition:all .2s}
    .btn:hover{border-color:var(--teal);color:var(--text)}
    .btn.primary{background:rgba(0,201,167,.12);color:var(--teal);border-color:var(--teal)}
    .btn.danger{background:rgba(248,113,113,.12);color:var(--red);border-color:var(--red)}
    .btn.active-mode{background:var(--teal);color:#000;border-color:var(--teal)}
    .btn:disabled{opacity:.25;cursor:not-allowed;pointer-events:none}
    .speed-row{display:flex;align-items:center;gap:8px}
    .slbl{font-size:11px;color:var(--muted);white-space:nowrap}
    input[type=range]{flex:1;accent-color:var(--teal)}
    .sval{font-size:11px;color:var(--teal);min-width:22px;text-align:right}
    .counters{display:flex;border-bottom:1px solid var(--border);flex-shrink:0}
    .cnt{flex:1;padding:10px;text-align:center;border-right:1px solid var(--border)}
    .cnt:last-child{border-right:none}
    .cnt-val{font-size:18px;font-weight:700;color:var(--teal)}
    .cnt-lbl{font-size:9px;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);margin-top:1px}
    .sec-title{font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);padding:10px 14px 4px}
    .states{flex:1;overflow-y:auto;padding:0 8px 8px;scrollbar-width:thin;scrollbar-color:var(--border) transparent}
    .si{display:flex;align-items:center;gap:8px;padding:6px 8px;border-radius:6px;margin-bottom:2px;transition:background .2s}
    .si.active{background:rgba(0,201,167,.1)}
    .si.visited{background:rgba(255,255,255,.02)}
    .si-dot{width:7px;height:7px;border-radius:50%;background:#2a2d38;flex-shrink:0;transition:background .3s}
    .si.active .si-dot{background:var(--teal);box-shadow:0 0 5px var(--teal)}
    .si.visited .si-dot{background:var(--purple)}
    .si-name{font-size:11px;font-weight:600;color:var(--muted);min-width:95px;transition:color .2s}
    .si.active .si-name{color:var(--teal)}
    .si.visited .si-name{color:var(--text)}
    .si-action{font-size:10px;color:var(--muted)}
    .log-wrap{border-top:1px solid var(--border);height:145px;display:flex;flex-direction:column;flex-shrink:0}
    .log-hdr{padding:6px 14px;display:flex;justify-content:space-between;align-items:center}
    .log-clr{font-size:10px;color:var(--muted);cursor:pointer}.log-clr:hover{color:var(--text)}
    .log-body{flex:1;overflow-y:auto;padding:0 14px 8px;font-family:monospace;font-size:10px;
      line-height:1.7;scrollbar-width:thin;scrollbar-color:var(--border) transparent}
    .le .ts{color:#4b5563;margin-right:5px}
    .le.info .ev{color:var(--teal)}.le.warn .ev{color:var(--amber)}
  </style>
</head>
<body>
<header>
  <span class="logo">BK05</span>
  <span style="color:var(--border)">|</span>
  <span class="htitle">SMD Reel Packing — Simplified Digital Twin</span>
  <div class="hdot" id="hdot"></div>
  <span id="hstatus">Idle</span>
</header>

<div id="canvas-wrap">
  <canvas id="c"></canvas>
  <div class="overlay">
    <div class="ov-label">Current State</div>
    <div class="ov-state" id="ovState">READY</div>
    <div class="ov-desc" id="ovDesc">Waiting for Start</div>
  </div>
  <div class="anim-tag" id="animTag">⟳ Animating</div>
</div>

<div class="panel">
  <div class="ctrl">
    <div class="btn-row" style="margin-bottom: 4px;">
      <button class="btn active-mode" id="btnModeAuto" onclick="switchMode('auto')">🤖 Auto</button>
      <button class="btn" id="btnModeManual" onclick="switchMode('manual')">🕹️ Manual</button>
    </div>
    <div class="btn-row">
      <button class="btn primary" id="btnStart" onclick="fsmStart()">▶ Start</button>
      <button class="btn" id="btnStep" onclick="fsmStep()" disabled style="background:rgba(167,139,250,0.15); color:var(--purple); border-color:var(--purple)">Step ➡️</button>
      <button class="btn danger" id="btnReset" onclick="fsmReset()" disabled>↺ Reset</button>
    </div>
    <div class="speed-row" id="speedRow">
      <span class="slbl">Speed</span>
      <input type="range" id="spd" min="0.5" max="3" step="0.5" value="1"
        oninput="speedMul=+this.value;document.getElementById('sval').textContent=this.value+'×'">
      <span class="sval" id="sval">1×</span>
    </div>
  </div>
  <div class="counters">
    <div class="cnt"><div class="cnt-val" id="cCycles">0</div><div class="cnt-lbl">Feeds (Cycles)</div></div>
  </div>
  <div class="sec-title">FSM States (Strict Sequential Loops)</div>
  <div class="states" id="statesList"></div>
  <div class="log-wrap">
    <div class="log-hdr">
      <span class="sec-title" style="padding:0">Event Log</span>
      <span class="log-clr" onclick="document.getElementById('logBody').innerHTML=''">Clear</span>
    </div>
    <div class="log-body" id="logBody"></div>
  </div>
</div>

<script type="module">
import * as THREE from 'three';
import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

const PART_NAMES = {
  carrier_tape: 'Cerrier', 
  roller_feed:  'Roll_1', 
  feeder_block: 'Feed_Cerrier',
  roller_blue:  'Roll_2', 
  sealing_head: 'Sealing', 
};

// 🌟 🌟 แตก FSM States แยกออกจากกันตามที่นิวสั่งเด็ดขาด 🌟 🌟
const STATES = [
  {id:'INIT',       action:'Initialize System'},
  {id:'READY',      action:'Waiting for Start'},
  {id:'SEAL_DOWN',  action:'[สเตป 1] หัว Sealing สับกดลงหาหน้าเทป (อย่างเดียว)'}, 
  {id:'SEAL_UP',    action:'[สเตป 2] หัว Sealing ยกกลับขึ้นพิกัดเริ่มต้น (อย่างเดียว)'}, 
  {id:'FEED_STEP',  action:'[สเตป 3] สายพาน Cerrier เลื่อน 1 สเตป + ล้อทุกล้อหมุนตาม'}, 
];

// กำหนดทิศทางการไหลของลอจิกอัตโนมัติ (FSM Transition Matrix)
const TR = {
  INIT:        {auto:'READY'},
  READY:       {auto:'SEAL_DOWN'},
  SEAL_DOWN:   {auto:'SEAL_UP'}, 
  SEAL_UP:     {auto:'FEED_STEP'}, 
  FEED_STEP:   {auto:'SEAL_DOWN'}, // วนลูปกลับไปเริ่มกดใหม่
};

// กำหนดหน่วงเวลาแอนิเมชันของแต่ละสเตตแยกอิสระ (มิลลิวินาที)
const DUR = { INIT:400, READY:600, SEAL_DOWN:500, SEAL_UP:500, FEED_STEP:600 };

window.speedMul = 1;
const ms = id => (DUR[id]||400) / speedMul;

// ── Three.js Setup ──
const canvas = document.getElementById('c');
const renderer = new THREE.WebGLRenderer({canvas, antialias:true});
renderer.setPixelRatio(Math.min(devicePixelRatio,2));
renderer.outputColorSpace = THREE.SRGBColorSpace;

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x06080a);
const camera = new THREE.PerspectiveCamera(45,1,0.01,1000);
const controls = new OrbitControls(camera, canvas);
controls.enableDamping = true;

scene.add(new THREE.AmbientLight(0xffffff,1.2));
const dl = new THREE.DirectionalLight(0xffffff,1.5); dl.position.set(4,6,4); scene.add(dl);

function resize(){
  const p=canvas.parentElement;
  renderer.setSize(p.clientWidth,p.clientHeight,false);
  camera.aspect=p.clientWidth/p.clientHeight;
  camera.updateProjectionMatrix();
}
resize();
new ResizeObserver(resize).observe(canvas.parentElement);

// ── Mesh Registry ──
const meshMap={}, origPos={}, origMat={};
function reg(role,mesh){
  meshMap[role]=mesh;
  origPos[role]=mesh.position.clone();
  mesh._origRot = mesh.rotation.clone(); 
  if(mesh.material) {
    origMat[role]=Array.isArray(mesh.material)?mesh.material.map(m=>m.clone()):mesh.material.clone();
  }
}

// ── Tween & Animation System ──
const tweens=[];

function twCustomKey(roleKey,targetMesh,fromPos,toPos,durSec,onDone=null){
  const i=tweens.findIndex(t=>t.role===roleKey); if(i>-1) tweens.splice(i,1);
  tweens.push({
    role: roleKey, mesh: targetMesh, from: fromPos.clone(), to: toPos.clone(), dur: durSec, elapsed: 0, onDone
  });
  document.getElementById('animTag').style.display='block';
}

function twRot(role,deltaRot,durSec,axis='x',onDone=null){
  const mesh=meshMap[role]; if(!mesh) return;
  const key=role+'_r';
  const i=tweens.findIndex(t=>t.role===key); if(i>-1) tweens.splice(i,1);
  tweens.push({role:key,mesh,fromRot:mesh.rotation[axis],toRot:mesh.rotation[axis]+deltaRot,isRot:true,rotAxis:axis,dur:durSec,elapsed:0,onDone});
  document.getElementById('animTag').style.display='block';
}

function ret(role,durSec=0.18){
  const mesh=meshMap[role]; if(!mesh||!origPos[role]) return;
  const i=tweens.findIndex(t=>t.role===role); if(i>-1) tweens.splice(i,1);
  tweens.push({role,mesh,from:mesh.position.clone(),to:origPos[role].clone(),dur:durSec,elapsed:0,onDone:null});
}
function ease(t){return t<0.5?2*t*t:-1+(4-2*t)*t;}

function restoreAll(){
  Object.keys(meshMap).forEach(r=>{
    const m=meshMap[r];
    if(m&&origMat[r]) m.material=Array.isArray(origMat[r])?origMat[r].map(x=>x.clone()):origMat[r].clone();
  });
}

// ── 🎬 ฟังก์ชันควบคุมแอนิเมชันตามสเตต FSM (Strict Step Animation Dispatcher) ──
function playAnim(id){
  const S = speedMul;
  const sealMesh = meshMap['sealing_head'];
  const tapeMesh = meshMap['carrier_tape'];

  switch(id){
    case 'SEAL_DOWN':
      // 🌟 [สเตป 1]: สั่งหัวซีลขยับกดลงแกน Y หาเนื้อเทปอย่างเดียว
      if(sealMesh && origPos['sealing_head']){
        const downTarget = origPos['sealing_head'].clone().add(new THREE.Vector3(0, -0.02, 0));
        twCustomKey('sealing_down', sealMesh, sealMesh.position, downTarget, 0.4/S);
      }
      break;

    case 'SEAL_UP':
      // 🌟 [สเตป 2]: สั่งดึงหัวซีลกลับคืนตำแหน่งเดิมด้านบนอย่างเดียวร้อยเปอร์เซ็นต์
      if(sealMesh && origPos['sealing_head']){
        twCustomKey('sealing_up', sealMesh, sealMesh.position, origPos['sealing_head'], 0.4/S);
      }
      break;

    case 'FEED_STEP':
      // 🌟 [สเตป 3]: รางเทป Cerrier เริ่มสไลด์หน้า 1 สเตป พร้อมให้กลไกม้วนล้อทุกล้อหมุนป้อนสัมพันธ์กัน
      if(tapeMesh && origPos['carrier_tape']) {
        // ดักลูปสายพานไม่ให้ไหลเตลิด: ถ้ารอบปัจจุบันยื่นเลยระยะฟีดกำหนด ให้ดีดวาร์ปกลับหลังเงียบๆ ก่อนสไลด์รอบใหม่
        let currentDistance = tapeMesh.position.z - origPos['carrier_tape'].z;
        if (currentDistance > 0.4) {
          tapeMesh.position.copy(origPos['carrier_tape']);
        }
        // เลื่อนป้อนหน้าแกน Z ระยะ 20 ซม.
        twCustomKey('carrier_move', tapeMesh, tapeMesh.position, tapeMesh.position.clone().add(new THREE.Vector3(0, 0, 0.2)), 0.5/S);
      }
      
      // ล้อทุกล้อป้อนหมุนตามเข็มนาฬิกา
      twRot('roller_feed', -Math.PI * 0.5, 0.5/S, 'x'); // Roll_1 (ล้อแดงขวา)
      twRot('feeder_block', -Math.PI * 0.5, 0.5/S, 'z'); // Feed_Cerrier (ม้วนขาวกลาง รอบแกน Z)
      if (cycles % 2 === 0) {
        twRot('roller_blue', -Math.PI * 0.5, 0.5/S, 'x'); // Roll_2 (ล้อน้ำเงิน Gear 2:1)
      }
      break;

    case 'INIT':
      restoreAll();
      ret('carrier_tape', 0.25/S); 
      ret('sealing_head', 0.25/S);
      break;
  }
}

// ── Render Loop ──
const clock = new THREE.Clock();
function animate(){
  requestAnimationFrame(animate);
  const dt=clock.getDelta();
  controls.update();
  
  for(let i=tweens.length-1;i>=0;i--){
    const t=tweens[i]; t.elapsed+=dt;
    const p=Math.min(t.elapsed/t.dur,1), ep=ease(p);
    if(t.isRot) t.mesh.rotation[t.rotAxis||'x'] = t.fromRot + (t.toRot - t.fromRot) * ep;
    else t.mesh.position.lerpVectors(t.from,t.to,ep);
    if(p>=1){ if(t.onDone) t.onDone(); tweens.splice(i,1); }
  }

  // เคลียร์ผลสะสมระยะฟูปคงคลังใน Render Loop ออก
  const tapeMesh = meshMap['carrier_tape'];
  if (tapeMesh && origPos['carrier_tape']) {
    let distanceMoved = tapeMesh.position.z - origPos['carrier_tape'].z;
    if (distanceMoved > 0.4) {
      tapeMesh.traverse(child => { if (child.isMesh && child.material) child.material.opacity = Math.max(0, 1 - (distanceMoved - 0.4) * 4); });
    } else {
      tapeMesh.traverse(child => { if (child.isMesh && child.material) child.material.opacity = 1.0; });
    }
  }

  if(tweens.length===0) document.getElementById('animTag').style.display='none';
  renderer.render(scene,camera);
}
animate();

// ── โหลดไฟล์โมเดล Run.glb ──
new GLTFLoader().load('./export/Run.glb', gltf=>{
  const model = gltf.scene; scene.add(model);
  model.traverse(obj => { if(obj.isMesh) { obj.castShadow = obj.receiveShadow = true; } });

  const box=new THREE.Box3().setFromObject(model);
  const center=box.getCenter(new THREE.Vector3());
  const size=box.getSize(new THREE.Vector3()).length();
  camera.position.set(center.x + size*0.6, center.y + size*0.5, center.z + size*0.8);
  controls.target.copy(center); controls.update();
  
  let feederGroup = null;
  model.traverse(obj => {
    if (obj.name === PART_NAMES.carrier_tape) {
      obj.traverse(child => {
        if (child.isMesh && child.material) {
          child.material = child.material.clone(); 
          child.material.transparent = true;
          child.material.opacity = 1.0;
        }
      });
      reg('carrier_tape', obj);
    }
    else if (obj.name === PART_NAMES.sealing_head) reg('sealing_head', obj);
    else if (obj.name === PART_NAMES.roller_feed) {
      obj.geometry.computeBoundingBox();
      const localCenter = new THREE.Vector3(); obj.geometry.boundingBox.getCenter(localCenter);
      obj.geometry.center(); obj.updateMatrixWorld(true); localCenter.applyMatrix4(obj.matrixWorld);
      obj.position.copy(localCenter); reg('roller_feed', obj);
    } 
    else if (obj.name === PART_NAMES.roller_blue) {
      if(obj.isMesh) {
        obj.geometry.computeBoundingBox();
        const blueCenter = new THREE.Vector3(); obj.geometry.boundingBox.getCenter(blueCenter);
        obj.geometry.center(); blueCenter.applyMatrix4(obj.matrixWorld);
        obj.position.copy(blueCenter); reg('roller_blue', obj);
      } else { reg('roller_blue', obj); }
    }
    else if (obj.name === PART_NAMES.feeder_block) feederGroup = obj;
  });
  
  if(feederGroup) {
    feederGroup.updateMatrixWorld(true);
    const worldPos = new THREE.Vector3(), worldQuat = new THREE.Quaternion(), worldScale = new THREE.Vector3();
    feederGroup.matrixWorld.decompose(worldPos, worldQuat, worldScale);
    scene.add(feederGroup); feederGroup.position.copy(worldPos); feederGroup.quaternion.copy(worldQuat); feederGroup.scale.copy(worldScale);
    let innerMesh = null; feederGroup.traverse(child => { if(child.isMesh && !innerMesh) innerMesh = child; });
    if(innerMesh && innerMesh.geometry) {
      innerMesh.geometry.computeBoundingBox();
      const innerCenter = new THREE.Vector3(); innerMesh.geometry.boundingBox.getCenter(innerCenter);
      innerMesh.geometry.center(); innerMesh.position.add(innerCenter); 
      reg('feeder_block', innerMesh); 
    } else { reg('feeder_block', feederGroup); }
  }
  addLog(`FSM Multi-State Loaded — Manual 3-Step Sequence Ready`,'info');
},null,err=>addLog('GLB error: '+err.message,'err'));

// ── UI Generation ──
const sl=document.getElementById('statesList');
STATES.forEach(s=>{
  const el=document.createElement('div'); el.className='si'; el.id='si_'+s.id;
  el.innerHTML=`<div class="si-dot"></div><span class="si-name">${s.id}</span><span class="si-action">${s.action}</span>`;
  sl.appendChild(el);
});

function addLog(msg,type='info'){
  const b=document.getElementById('logBody'); const ts=new Date().toTimeString().slice(0,8);
  const el=document.createElement('div'); el.className='le '+type;
  el.innerHTML=`<span class="ts">${ts}</span><span class="ev">${msg}</span>`;
  b.appendChild(el); b.scrollTop=b.scrollHeight;
}

// ── ระบบ FSM Control Engine ──
let current='READY', running=false, timer=null, isManualMode = false, stepAllowed = false, cycles=0;

window.switchMode = function(mode) {
  isManualMode = (mode === 'manual');
  document.getElementById('btnModeManual').classList.toggle('active-mode', isManualMode);
  document.getElementById('btnModeAuto').classList.toggle('active-mode', !isManualMode);
  document.getElementById('speedRow').style.opacity = isManualMode ? '0.4' : '1';
  document.getElementById('btnStep').disabled = !(running && isManualMode && stepAllowed);
  addLog(isManualMode ? '🕹️ Manual Mode (กดปุ่ม Step เพื่อขยับทีละสเตป)' : '🤖 Auto Mode', isManualMode ? 'warn' : 'info');
  
  if(!isManualMode && running && stepAllowed) {
    stepAllowed = false;
    document.getElementById('btnStep').disabled = true;
    triggerNextTransition();
  }
}

function setState(id){
  document.querySelectorAll('.si.active').forEach(e=>{ e.classList.remove('active'); e.classList.add('visited'); });
  current=id;
  const el=document.getElementById('si_'+id); if(el){el.classList.remove('visited'); el.classList.add('active');}
  const s=STATES.find(x=>x.id===id);
  document.getElementById('ovState').textContent=id; document.getElementById('ovDesc').textContent=s?.action||'';
  const dot=document.getElementById('hdot'), hs=document.getElementById('hstatus');
  dot.className = running ? 'hdot run' : 'hdot'; hs.textContent = running ? 'Running' : 'Idle';
  
  playAnim(id); // กระตุ้นแอนิเมชันตามสเตตปัจจุบัน
  
  addLog('→ '+id, 'info');
  if(id==='FEED_STEP') { cycles++; document.getElementById('cCycles').textContent=cycles; }
  
  if(!running) return;

  // หน่วงเวลารอให้แอนิเมชันในสเตตนั้นทำเสร็จ
  timer = setTimeout(() => {
    if (isManualMode) {
      stepAllowed = true;
      document.getElementById('btnStep').disabled = false;
      addLog(`[Ready] สเตท ${id} ทำงานจบแล้ว กดปุ่ม Step เพื่อขยับขั้นถัดไป...`, 'warn');
    } else {
      triggerNextTransition();
    }
  }, ms(id));
}

function triggerNextTransition() {
  const tr = TR[current]; if(!tr) return;
  if(tr.auto) advance('auto');
}

function advance(sig){ if(!running) return; clearTimeout(timer); const tr = TR[current]; const next = tr[sig] || tr.auto; if(next) setState(next); }

window.fsmStep = function() { 
  if(!running || !isManualMode || !stepAllowed) return; 
  stepAllowed = false; 
  document.getElementById('btnStep').disabled = true; 
  triggerNextTransition(); 
}

window.fsmStart = function(){ if(running) return; running=true; setState('INIT'); document.getElementById('btnStart').disabled=true; document.getElementById('btnReset').disabled=false; };
window.fsmReset = function(){
  clearTimeout(timer); running=false; stepAllowed=false; cycles=0; document.getElementById('cCycles').textContent=0;
  restoreAll(); tweens.length=0;
  Object.keys(meshMap).forEach(role=>{
    const m=meshMap[role]; if(m && origPos[role]){ m.position.copy(origPos[role]); if(m._origRot) m.rotation.copy(m._origRot); }
  });
  document.getElementById('btnStart').disabled=false; document.getElementById('btnStep').disabled=true; document.getElementById('btnReset').disabled=true;
  document.getElementById('hdot').className='hdot'; document.getElementById('hstatus').textContent='Idle';
  document.querySelectorAll('.si').forEach(e=>e.classList.remove('active','visited'));
  document.getElementById('ovState').textContent='READY'; current='READY';
};
</script>
</body>
</html>
