<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>BK05 — Home 3D Viewer</title>

  <script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>

  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }
    
    body {
      margin: 0;
      background: #0a0c0f; /* สีพื้นหลังธีมมืดเดียวกับหน้าแดชบอร์ด */
      font-family: 'Segoe UI', system-ui, sans-serif;
      overflow: hidden;
      position: relative;
    }

    /* สไตล์คุมโมเดล 3D เต็มหน้าจอ */
    model-viewer {
      width: 100%;
      height: 100vh;
    }

    /* กล่องข้อความและปุ่มกดลอยอยู่บนหน้าจอ */
    .interface-overlay {
      position: absolute;
      top: 40px;
      left: 50%;
      transform: translateX(-50%);
      text-align: center;
      pointer-events: none; /* ปล่อยให้เมาส์คลิกทะลุไปหมุนโมเดลด้านหลังได้ */
      width: 100%;
      max-width: 500px;
      padding: 0 20px;
    }

    h1 {
      color: #e8eaf0;
      font-size: 28px;
      font-weight: 600;
      letter-spacing: 0.05em;
      margin-bottom: 8px;
      text-shadow: 0 2px 10px rgba(0,0,0,0.5);
    }

    p {
      color: #6b7080;
      font-size: 14px;
      margin-bottom: 24px;
    }

    /* ปุ่มกดเข้าสู่ระบบ Digital Twin */
    .btn-enter {
      display: inline-block;
      pointer-events: auto; /* เปิดให้ปุ่มตอบสนองการกด */
      padding: 12px 32px;
      background: rgba(0, 201, 167, 0.12); /* สีเขียวฟ้านีออน */
      color: #00c9a7;
      border: 2px solid #00c9a7;
      border-radius: 30px;
      font-size: 14px;
      font-weight: 600;
      text-decoration: none;
      letter-spacing: 0.08em;
      transition: all 0.3s ease;
      box-shadow: 0 4px 15px rgba(0, 201, 167, 0.2);
    }

    .btn-enter:hover {
      background: #00c9a7;
      color: #0a0c0f;
      box-shadow: 0 0 20px #00c9a7;
      transform: translateY(-2px);
    }
  </style>
</head>

<body>

  <model-viewer
    src="./export/Tast.glb"
    auto-rotate
    camera-controls
    shadow-intensity="1">
  </model-viewer>

  <div class="interface-overlay">
    <h1>BK05 MACHINE</h1>
    <p>SMD Reel Packing — 3D Interactive Model</p>
    
    <a href="./index1.html" class="btn-enter">🕹️ ENTER DIGITAL TWIN</a>
  </div>

</body>
</html>
